<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head('Trova atleti — SIW Corsa')}"></head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="main-container">
    <section class="section">
        <div class="section-header">
            <h1 class="page-title">
                Follower
            </h1>
            <p class="section-desc">la community del running</p>
        </div>

        <div class="table-container">
            <table class="table">
                <thead>
                <tr>
                    <th>Nome</th>
                    <th>Email</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${utenti}" th:if="${utenteCorrente == null || u.id != utenteCorrente.id}">
                    <td>
                        <a th:href="@{/utenti/{id}(id=${u.id})}" th:text="${u.nome} + ' ' + ${u.cognome}" class="text-accent font-semibold">Nome</a>
                    </td>
                    <td class="text-muted" th:text="${u.email}">email</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

</body>
</html>
