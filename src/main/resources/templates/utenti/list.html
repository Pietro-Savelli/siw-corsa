<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head('Trova atleti — SIW Corsa')}"></head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="main-container">
    <section class="section">
        <div class="section-header">
            <h1 class="page-title">
                Atleti seguiti
            </h1>
            <p class="section-desc">la community del running</p>
        </div>

        <div class="table-container">
            <table class="table">
                <thead>
                <tr>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Azione</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${utenti}" th:if="${utenteCorrente == null || u.id != utenteCorrente.id}">
                    <td>
                        <a th:href="@{/utenti/{id}(id=${u.id})}" th:text="${u.nome} + ' ' + ${u.cognome}" class="text-accent font-semibold">Nome</a>
                    </td>
                    <td class="text-muted" th:text="${u.email}">email</td>
                    <td>
                        <form th:if="${userDetails != null and !utenteCorrente.seguiti.contains(u)}"
                              th:action="@{/utenti/{id}/segui(id=${u.id})}" method="post" class="inline-form">
                            <input type="hidden" name="redirectTo" value="/utenti"/>
                            <button type="submit" class="btn btn-outline btn-small">
                                <i class="fa-solid fa-plus"></i> Segui
                            </button>
                        </form>

                        <form th:if="${userDetails != null and utenteCorrente.seguiti.contains(u)}"
                              th:action="@{/utenti/{id}/smetti-di-seguire(id=${u.id})}" method="post" class="inline-form">
                            <input type="hidden" name="redirectTo" value="/utenti"/>
                            <button type="submit" class="btn btn-outline btn-small" style="color: red; border-color: red;">
                                <i class="fa-solid fa-xmark"></i> Smetti di seguire
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <p th:if="${userDetails == null}" class="section-desc mt-4">
            <a href="/login" class="text-accent"><i class="fa-solid fa-right-to-bracket"></i> Accedi</a> per poter gestire i tuoi atleti.
        </p>
    </section>
</main>

</body>
</html>
