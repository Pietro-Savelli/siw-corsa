<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head(${utenteVisitato.nome} + ' ' + ${utenteVisitato.cognome} + ' — SIW Corsa')}"></head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="main-container">

    <section class="section">
        <div class="section-header">
            <h1 class="section-title" style="font-size: var(--font-size-4xl);">
                <i class="fa-solid fa-user-circle" style="color: var(--color-text-muted);"></i>
                <span th:text="${utenteVisitato.nome} + ' ' + ${utenteVisitato.cognome}">Nome Atleta</span>
            </h1>
            <p class="section-desc" th:text="${utenteVisitato.email}">email@esempio.it</p>
        </div>

        <div style="display: flex; gap: var(--space-4); margin-top: var(--space-2); flex-wrap: wrap;">
            <div style="background: var(--color-surface); padding: var(--space-3) var(--space-6); border-radius: var(--radius-lg); border: 1px solid var(--color-border); display: flex; align-items: baseline; gap: var(--space-2);">
                <span style="font-size: var(--font-size-xl); font-weight: var(--font-weight-bold); color: var(--color-text);" th:text="${numFollower}">0</span>
                <span style="font-size: var(--font-size-sm); color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.05em;">Follower</span>
            </div>
            <div style="background: var(--color-surface); padding: var(--space-3) var(--space-6); border-radius: var(--radius-lg); border: 1px solid var(--color-border); display: flex; align-items: baseline; gap: var(--space-2);">
                <span style="font-size: var(--font-size-xl); font-weight: var(--font-weight-bold); color: var(--color-text);" th:text="${numSeguiti}">0</span>
                <span style="font-size: var(--font-size-sm); color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.05em;">Seguiti</span>
            </div>
        </div>

        <div th:if="${utenteVisitato.squadra != null}" class="bacheche-card" style="max-width: 600px; margin-top: var(--space-4);">
            <div class="bacheche-icon" style="background: var(--color-primary-light); color: var(--color-primary);">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <div class="bacheche-body">
                <span class="bacheche-title">
                    Squadra:
                    <a th:href="@{/squadre/{id}(id=${utenteVisitato.squadra.id})}" th:text="${utenteVisitato.squadra.nome}" class="text-accent">Nome Squadra</a>
                </span>
            </div>
        </div>

        <div style="margin-top: var(--space-4); display: flex; gap: var(--space-4); align-items: center; flex-wrap: wrap;">
            <div th:if="${userDetails != null and !isMioProfilo}">

                <form th:if="${!loSeguo}" th:action="@{/utenti/{id}/segui(id=${utenteVisitato.id})}" method="post" style="margin: 0;">
                    <input type="hidden" name="redirectTo" th:value="@{/utenti/{id}(id=${utenteVisitato.id})}"/>
                    <button type="submit" style="background: var(--gradient-primary); color: white; border: none; padding: var(--space-3) var(--space-6); border-radius: var(--radius-full); font-weight: var(--font-weight-bold); cursor: pointer; box-shadow: var(--shadow-sm); font-family: inherit;">
                        <i class="fa-solid fa-user-plus"></i> Segui
                    </button>
                </form>

                <form th:if="${loSeguo}" th:action="@{/utenti/{id}/smetti-di-seguire(id=${utenteVisitato.id})}" method="post" style="margin: 0;">
                    <input type="hidden" name="redirectTo" th:value="@{/utenti/{id}(id=${utenteVisitato.id})}"/>
                    <button type="submit" style="background: transparent; color: var(--color-text); border: 1px solid var(--color-border); padding: var(--space-3) var(--space-6); border-radius: var(--radius-full); font-weight: var(--font-weight-bold); cursor: pointer; font-family: inherit;">
                        <i class="fa-solid fa-user-minus"></i> Smetti di seguire
                    </button>
                </form>

            </div>

            <p th:if="${userDetails == null}" class="section-desc" style="margin: 0;">
                <a href="/login" class="text-accent"><i class="fa-solid fa-right-to-bracket"></i> Accedi</a> per seguire questo atleta.
            </p>

            <a th:if="${isMioProfilo}" href="/profilo" style="color: var(--color-secondary); font-weight: var(--font-weight-semibold); padding: var(--space-3) 0;">
                <i class="fa-solid fa-arrow-right"></i> Vai al tuo profilo completo
            </a>
        </div>
    </section>

    <hr style="border: none; border-top: 1px solid var(--color-border); margin: var(--space-4) 0;" />

    <section class="section">
        <div class="section-header">
            <h2 class="section-title">
                <i class="fa-solid fa-person-running"></i> I Suoi allenamenti
            </h2>
        </div>

        <div th:if="${#lists.isEmpty(allenamenti)}" class="action-card" style="min-height: auto; align-items: center; text-align: center; padding: var(--space-8);">
            <p class="section-desc">Nessun allenamento registrato.</p>
        </div>

        <div th:unless="${#lists.isEmpty(allenamenti)}" style="background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-xl); overflow-x: auto; box-shadow: var(--shadow-sm); backdrop-filter: blur(8px);">
            <table style="width: 100%; border-collapse: collapse; text-align: left;">
                <thead style="background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--color-border);">
                <tr>
                    <th style="padding: var(--space-4); font-weight: var(--font-weight-semibold); font-size: var(--font-size-sm); color: var(--color-text-muted);">Data</th>
                    <th style="padding: var(--space-4); font-weight: var(--font-weight-semibold); font-size: var(--font-size-sm); color: var(--color-text-muted);">Titolo</th>
                    <th style="padding: var(--space-4); font-weight: var(--font-weight-semibold); font-size: var(--font-size-sm); color: var(--color-text-muted);">Tipo</th>
                    <th style="padding: var(--space-4); font-weight: var(--font-weight-semibold); font-size: var(--font-size-sm); color: var(--color-text-muted);">Km</th>
                    <th style="padding: var(--space-4); font-weight: var(--font-weight-semibold); font-size: var(--font-size-sm); color: var(--color-text-muted);">Scarpa</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="a : ${allenamenti}" style="border-bottom: 1px solid var(--color-border);">
                    <td style="padding: var(--space-4); color: var(--color-text-muted);" th:text="${#temporals.format(a.data, 'dd/MM/yyyy')}">data</td>
                    <td style="padding: var(--space-4);">
                        <a th:href="@{/allenamenti/{id}/globale(id=${a.id})}" th:text="${a.titolo}" class="text-accent" style="font-weight: var(--font-weight-medium);">Titolo</a>
                    </td>
                    <td style="padding: var(--space-4);">
                        <span style="background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: var(--radius-sm); border: 1px solid var(--color-border); font-size: var(--font-size-xs); font-weight: var(--font-weight-medium);" th:text="${a.tipoDiAllenamento}">Z2</span>
                    </td>
                    <td style="padding: var(--space-4); font-weight: var(--font-weight-bold);" th:text="${a.distanzaInKm} + ' km'">10 km</td>
                    <td style="padding: var(--space-4); color: var(--color-text-muted);" th:text="${a.scarpa != null ? a.scarpa.marca + ' ' + a.scarpa.modello : '—'}">—</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>

</main>

</body>
</html>
