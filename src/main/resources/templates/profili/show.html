<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Il mio profilo</title>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<h1 th:text="${utente.nome} + ' ' + ${utente.cognome}">Nome Atleta</h1>
<p th:text="${utente.email}">email@esempio.it</p>

<div th:if="${utente.squadra != null}">
    <p>🛡️ Squadra: 
        <a th:href="@{/squadre/{id}(id=${utente.squadra.id})}" 
           th:text="${utente.squadra.nome}">Nome Squadra</a>
    </p>

    <form th:action="@{/squadre/abbandona}" method="post" onsubmit="return confirm('Sei sicuro di voler abbandonare la tua squadra?');">
        <button type="submit" style="color: white; background-color: #d9534f; border: none; padding: 5px 10px; cursor: pointer;">
            🚪 Abbandona squadra
        </button>
    </form>
</div>

<div th:if="${utente.squadra == null}">
    <p>Non fai ancora parte di nessuna squadra.</p>
    <form th:action="@{/squadre}" method="get">
        <button type="submit">+ Unisciti a una squadra</button>
    </form>
</div>

<!-- Sezione scarpe -->
<h2>👟 Le mie scarpe</h2>
<a href="/scarpe/nuova"><button>+ Aggiungi scarpa</button></a>

<div th:if="${#lists.isEmpty(scarpe)}">
    <p>Nessuna scarpa registrata.</p>
</div>
<table th:unless="${#lists.isEmpty(scarpe)}" border="1">
    <thead>
    <tr>
        <th>Marca</th><th>Modello</th><th>Km totali</th><th>Km massimi</th><th>Stato</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="s : ${scarpe}">
        <td th:text="${s.marca}">Marca</td>
        <td th:text="${s.modello}">Modello</td>
        <td th:text="${s.kmTotali}">0</td>
        <td th:text="${s.kmMassimi}">700</td>
        <td>
            <span th:if="${s.kmTotali >= s.kmMassimi}" style="color:red">⚠ Da sostituire!</span>
            <span th:unless="${s.kmTotali >= s.kmMassimi}" style="color:green">✓ OK</span>
        </td>
    </tr>
    </tbody>
</table>

<hr/>


<h2>I miei allenamenti</h2>

<div id="root"></div>

<script type="module" src="/assets/index-DcQ14Djr.js"></script>

</body>
</html>
