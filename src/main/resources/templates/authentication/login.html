<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Accedi — SIW Corsa')}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="main-container">
    <section class="section">
        <div class="section-header">
            <h1 class="page-title">Accedi</h1>
        </div>

        <form th:action="@{/login}" method="post" class="max-w-600">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" class="form-input" name="username" required/>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" name="password" required/>
            </div>

            <p th:if="${param.error}" class="form-error">
                Username o password errati.
            </p>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Accedi</button>
            </div>
        </form>

        <p class="section-desc mt-4">Non hai un account? <a href="/register" class="text-accent">Registrati</a></p>
    </section>
</main>

</body>
</html>
