<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${isNuovo} ? 'Nuovo allenamento — SIW Corsa' : 'Modifica allenamento — SIW Corsa')}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="main-container">
    <section class="section">
        <div class="section-header">
            <h1 class="page-title" th:text="${isNuovo} ? 'Registra nuovo allenamento' : 'Modifica allenamento'">Form</h1>
        </div>

        <form th:action="${isNuovo} ? @{/allenamenti/nuovo} : @{/allenamenti/{id}/modifica(id=${allenamento.id})}"
              th:object="${allenamento}"
              method="post"
              class="max-w-600">

            <div class="form-group">
                <label class="form-label">Titolo</label>
                <input type="text" class="form-input" th:field="*{titolo}" placeholder="es. Ripetute 10km" required/>
            </div>

            <div class="form-group">
                <label class="form-label">Data</label>
                <input type="date" class="form-input" th:field="*{data}" required/>
            </div>

            <div class="form-group">
                <label class="form-label">Distanza (km)</label>
                <input type="number" class="form-input" th:field="*{distanzaInKm}" step="0.1" min="0" required/>
            </div>

            <div class="form-group">
                <label class="form-label">Tipo di allenamento</label>
                <select class="form-select" th:field="*{tipoDiAllenamento}">
                    <option value="">-- Seleziona --</option>
                    <option th:each="tipo : ${tipi}"
                            th:value="${tipo}"
                            th:text="${tipo}">Tipo</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Scarpa utilizzata (opzionale)</label>
                <select class="form-select" name="scarpaId">
                    <option value="">— Nessuna scarpa —</option>
                    <option th:each="s : ${scarpe}"
                            th:value="${s.id}"
                            th:selected="${allenamento.scarpa != null && allenamento.scarpa.id == s.id}"
                            th:text="${s.marca} + ' ' + ${s.modello} + ' (' + ${s.kmTotali} + ' km)'">
                        Scarpa
                    </option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary" th:text="${isNuovo} ? 'Salva allenamento' : 'Salva modifiche'">Salva</button>
                <a th:href="${isNuovo} ? '/profilo' : '/allenamenti/' + ${allenamento.id}" class="btn btn-outline">Annulla</a>
            </div>
        </form>
    </section>
</main>

</body>
</html>
