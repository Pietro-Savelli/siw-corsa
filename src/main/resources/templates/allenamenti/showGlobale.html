<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${allenamento.titolo} + ' — SIW Corsa')}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="main-container">
    <a href="/bacheca/generale" class="link-back"><i class="fa-solid fa-arrow-left"></i> Torna alla bacheca</a>

    <section class="section">
        <div class="section-header">
            <h1 class="page-title" th:text="${allenamento.titolo}">Titolo</h1>
        </div>

        <div class="table-container">
            <table class="table">
                <tr>
                    <th>Data</th>
                    <td th:text="${#temporals.format(allenamento.data, 'dd/MM/yyyy')}">data</td>
                </tr>
                <tr>
                    <th>Tipo</th>
                    <td th:text="${allenamento.tipoDiAllenamento}">Z2</td>
                </tr>
                <tr>
                    <th>Distanza</th>
                    <td th:text="${allenamento.distanzaInKm} + ' km'">10 km</td>
                </tr>
                <tr>
                    <th>Atleta</th>
                    <td th:text="${allenamento.atleta.nome} + ' ' + ${allenamento.atleta.cognome}">Nome</td>
                </tr>
            </table>
        </div>

        <div th:if="${allenamento.scarpa != null}" class="info-box mt-4">
            <h3 class="info-box__title"><i class="fa-solid fa-shoe-prints"></i> Scarpa utilizzata</h3>
            <p class="info-box__text" th:text="${allenamento.scarpa.marca} + ' ' + ${allenamento.scarpa.modello}">Scarpa</p>
        </div>
    </section>

    <hr class="divider"/>

    <section class="section">
        <div class="section-header">
            <h2 class="section-title"><i class="fa-solid fa-comments"></i> Commenti (<span th:text="${#lists.size(allenamento.commenti)}">0</span>)</h2>
        </div>

        <div class="comment-list">
            <div th:each="c : ${allenamento.commenti}" class="comment-item">
                <div class="comment-item__header">
                    <span class="comment-item__author" th:text="${c.autore.nome} + ' ' + ${c.autore.cognome}">Autore</span>
                    <span class="comment-item__date" th:text="${#temporals.format(c.dataOra, 'dd/MM/yyyy HH:mm')}">data</span>
                </div>
                <p class="comment-item__text" th:text="${c.testo}">Testo</p>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(allenamento.commenti)}" class="empty-state mt-4">
            <p class="section-desc">Nessun commento ancora</p>
        </div>
    </section>
</main>

</body>
</html>
