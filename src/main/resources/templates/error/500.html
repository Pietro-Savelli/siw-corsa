<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Errore 500 — SIW Corsa')}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="main-container">
    <div class="error-page">
        <span class="error-code">500</span>
        <h2 class="error-title">Ops! Qualcosa è andato storto.</h2>
        <p class="error-desc">Abbiamo riscontrato un problema tecnico durante l'elaborazione della tua richiesta.</p>

        <div th:if="${message}" class="error-message-box">
            <strong>Dettaglio errore:</strong> <span th:text="${message}">Messaggio di errore</span>
        </div>

        <a th:href="@{/}" class="btn btn-primary">Torna alla pagina principale</a>
    </div>
</main>

</body>
</html>
