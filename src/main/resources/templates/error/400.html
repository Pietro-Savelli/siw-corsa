<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Errore 400 — SIW Corsa')}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="main-container">
    <div class="error-page">
        <span class="error-code">400</span>
        <h2 class="error-title">Richiesta non valida.</h2>
        <p class="error-desc">Il server non è riuscito a comprendere la tua richiesta. Potresti aver inserito un dato non valido o saltato un parametro obbligatorio.</p>

        <p th:if="${errorMessage}" class="error-message-box" th:text="${errorMessage}"></p>
    </div>
</main>

</body>
</html>
