<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Errore 403 — SIW Corsa')}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="main-container">
    <div class="error-page">
        <span class="error-code">403</span>
        <h2 class="error-title">Alt! Accesso Negato.</h2>
        <p class="error-desc">Non hai i permessi necessari per visualizzare questa pagina o eseguire questa azione.</p>

        <p th:if="${errorMessage}" class="error-message-box" th:text="${errorMessage}"></p>

        <a th:href="@{/}" class="btn btn-primary">Torna in un'area sicura</a>
    </div>
</main>

</body>
</html>
