<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Gestione Squadra — SIW Corsa')}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="main-container">
    <section class="section">
        <div class="section-header">
            <h1 class="page-title" th:text="${squadra.id == null} ? 'Crea Nuova Squadra' : 'Modifica Squadra'">Inserisci Squadra</h1>
        </div>

        <form th:action="@{/admin/squadre}" th:object="${squadra}" method="post" class="max-w-600">
            <div th:if="${#fields.hasGlobalErrors()}">
                <p class="form-error" th:each="err : ${#fields.globalErrors()}" th:text="${err}">Errore globale</p>
            </div>

            <input type="hidden" th:field="*{id}" />

            <div class="form-group">
                <label for="nome" class="form-label">Nome della Squadra: *</label>
                <input type="text" id="nome" class="form-input" th:field="*{nome}" required placeholder="Es. Atletica Roma" />
                <span class="form-error" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}">Errore nome</span>
            </div>

            <div class="form-group">
                <label for="citta" class="form-label">Città:</label>
                <input type="text" id="citta" class="form-input" th:field="*{citta}" placeholder="Es. Roma" />
                <span class="form-error" th:if="${#fields.hasErrors('citta')}" th:errors="*{citta}">Errore città</span>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Salva Squadra</button>
                <a th:href="@{/}" class="btn btn-outline">Annulla e torna alla Home</a>
            </div>
        </form>
    </section>
</main>

</body>
</html>
