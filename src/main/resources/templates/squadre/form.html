<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestione Squadra | SIW Corsa</title>

    <div th:replace="~{fragments/header :: header}"></div>

    <style>
        /* Un po' di stile base per rendere il form carino */
        .form-container {
            max-width: 500px;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #f9f9f9;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .error-message {
            color: #d9534f;
            font-size: 0.9em;
            margin-top: 5px;
            display: block;
        }
        .btn-submit {
            background-color: #28a745;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            width: 100%;
        }
        .btn-submit:hover {
            background-color: #218838;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: #007bff;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2 th:text="${squadra.id == null} ? 'Crea Nuova Squadra' : 'Modifica Squadra'">Inserisci Squadra</h2>
    
    <form th:action="@{/admin/squadre}" th:object="${squadra}" method="post">
        
        <div th:if="${#fields.hasGlobalErrors()}" style="color: red; margin-bottom: 15px;">
            <p th:each="err : ${#fields.globalErrors()}" th:text="${err}">Errore globale</p>
        </div>

        <input type="hidden" th:field="*{id}" />

        <div class="form-group">
            <label for="nome">Nome della Squadra: *</label>
            <input type="text" id="nome" th:field="*{nome}" required placeholder="Es. Atletica Roma" />
            <span class="error-message" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}">Errore nome</span>
        </div>

        <div class="form-group">
            <label for="citta">Città:</label>
            <input type="text" id="citta" th:field="*{citta}" placeholder="Es. Roma" />
            <span class="error-message" th:if="${#fields.hasErrors('citta')}" th:errors="*{citta}">Errore città</span>
        </div>

        <button type="submit" class="btn-submit">💾 Salva Squadra</button>
    </form>

    <a th:href="@{/}" class="back-link">🔙 Annulla e torna alla Home</a>
</div>

</body>
</html>
