<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Squadre — SIW Corsa')}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="main-container">
    <section class="section">
        <div class="section-header">
            <h1 class="page-title"><i class="fa-solid fa-shield-halved"></i> Squadre disponibili</h1>
            <p class="section-desc">Scegli la squadra a cui vuoi unirti:</p>
        </div>

        <div class="table-container">
            <table class="table">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Città</th>
                        <th>Stato / Azione</th>
                        <th th:if="${isAdmin}">Azioni Admin</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="squadra : ${squadre}">
                        <td>
                            <a th:href="@{/squadre/{id}(id=${squadra.id})}" th:text="${squadra.nome}" class="text-accent">Nome Squadra</a>
                        </td>
                        <td th:text="${squadra.citta}">Roma</td>
                        <td>
                            <div th:if="${utenteCorrente != null and utenteCorrente.squadra == null}">
                                <form th:action="@{/squadre/{id}/iscriviti(id=${squadra.id})}" method="post" class="inline-form">
                                    <button type="submit" class="btn btn-primary btn-small">Iscriviti!</button>
                                </form>
                            </div>

                            <div th:if="${utenteCorrente != null and utenteCorrente.squadra != null and utenteCorrente.squadra.id == squadra.id}">
                                <span class="badge badge-success">La tua squadra <i class="fa-solid fa-shield-halved"></i></span>
                            </div>
                        </td>

                        <td th:if="${isAdmin}">
                            <div class="actions-bar">
                                <a th:href="@{/admin/squadre/{id}/edit(id=${squadra.id})}" class="btn btn-warning btn-small">
                                    <i class="fa-solid fa-pen"></i> Modifica
                                </a>

                                <form th:action="@{/admin/squadre/{id}/delete(id=${squadra.id})}" method="post" class="inline-form" onsubmit="return confirm('Sei DAVVERO sicuro di voler eliminare questa squadra?');">
                                    <button type="submit" class="btn btn-danger btn-small">
                                        <i class="fa-solid fa-trash"></i> Elimina
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(squadre)}">
                        <td colspan="4" class="text-muted text-center font-italic">Nessuna squadra disponibile al momento.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="actions-bar mt-4">
            <a th:href="@{/}" class="btn btn-outline">Torna alla Home</a>
            <a th:href="@{/profilo}" class="btn btn-outline">Torna al tuo Profilo</a>
        </div>
    </section>
</main>

</body>
</html>
