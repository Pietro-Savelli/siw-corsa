<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${squadra.nome} + ' — SIW Corsa')}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="main-container">
    <section class="section">
        <div class="section-header">
            <h1 class="page-title" th:text="'🛡️ ' + ${squadra.nome}">Nome della Squadra</h1>
            <p class="section-desc" th:if="${squadra.citta != null}" th:text="'📍 Sede: ' + ${squadra.citta}">Sede: Roma</p>
        </div>

        <div class="actions-bar mt-4">
            <div th:if="${utenteCorrente != null and utenteCorrente.squadra == null}">
                <form th:action="@{/squadre/{id}/iscriviti(id=${squadra.id})}" method="post" class="inline-form">
                    <button type="submit" class="btn btn-primary">Iscriviti!</button>
                </form>
            </div>

            <div th:if="${utenteCorrente != null and utenteCorrente.squadra != null and utenteCorrente.squadra.id == squadra.id}">
                <span class="badge badge-success">La tua squadra <i class="fa-solid fa-shield-halved"></i></span>
            </div>
        </div>
    </section>

    <hr class="divider"/>

    <section class="section">
        <div class="section-header">
            <h2 class="section-title"><i class="fa-solid fa-person-running"></i> Atleti iscritti</h2>
        </div>

        <div class="table-container">
            <table class="table">
                <thead>
                    <tr>
                        <th>Nome e Cognome</th>
                        <th>Email</th>
                        <th>Azione</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="atleta : ${paginaAtleti.content}">
                        <td th:text="${atleta.nome + ' ' + atleta.cognome}">Marco Bianchi</td>
                        <td th:text="${atleta.email}">marco@email.com</td>
                        <td>
                            <a th:href="@{/utenti/{id}(id=${atleta.id})}">Vai al profilo</a>
                        </td>
                    </tr>
                    <tr th:if="${paginaAtleti.isEmpty()}">
                        <td colspan="3" class="text-muted text-center font-italic">Nessun atleta iscritto a questa squadra al momento.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination" th:if="${paginaAtleti.totalPages > 1}">
            <a th:if="${paginaAtleti.hasPrevious()}" th:href="@{/squadre/{id}(id=${squadra.id}, page=${paginaAtleti.number - 1})}">« Pagina Precedente</a>
            <span class="text-muted" th:text="' Pagina ' + (${paginaAtleti.number} + 1) + ' di ' + ${paginaAtleti.totalPages} + ' '"></span>
            <a th:if="${paginaAtleti.hasNext()}" th:href="@{/squadre/{id}(id=${squadra.id}, page=${paginaAtleti.number + 1})}">Pagina Successiva »</a>
        </div>
    </section>
</main>

</body>
</html>
