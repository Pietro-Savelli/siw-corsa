<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${squadra.nome} + ' - SIW Corsa'">Squadra - SIW Corsa</title>
    
    <div th:replace="~{fragments/header :: header}"></div>

    <div>
        <h1 th:text="'🛡️ ' + ${squadra.nome}">Nome della Squadra</h1>
        
        <p th:if="${squadra.citta != null}" 
           th:text="'📍 Sede: ' + ${squadra.citta}" 
           style="font-size: 1.2em; color: #555;">
           Sede: Roma
        </p>
    </div>

    <h2>🏃‍♂️ Atleti iscritti</h2>

    <table border="1">
        <thead>
            <tr>
                <th>Nome e Cognome</th>
                <th>Email</th>
                <th>Azione</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="atleta : ${paginaAtleti.content}">
                <td th:text="${atleta.nome + ' ' + atleta.cognome}">Marco Bianchi</td>
                <td th:text="${atleta.email}">marco@email.com</td>
                <td>
                    <a th:href="@{/utenti/{id}(id=${atleta.id})}">Vai al profilo</a>
                </td>
            </tr>

            <td th:if="${utenteCorrente != null and utenteCorrente.squadra == null}">
                <form th:action="@{/squadre/{id}/iscriviti(id=${squadra.id})}" method="post">
                    <button type="submit">Iscriviti!</button>
                </form>
            </td>

            <td th:if="${utenteCorrente != null and utenteCorrente.squadra != null and utenteCorrente.squadra.id == squadra.id}">
                <span style="color: green; font-weight: bold;">La tua squadra 🛡️</span>
            </td>

            <tr th:if="${paginaAtleti.isEmpty()}">
                <td colspan="3">Nessun atleta iscritto a questa squadra al momento.</td>
            </tr>
        </tbody>
    </table>

    <div style="margin-top: 15px;" th:if="${paginaAtleti.totalPages > 1}">
        
        <a th:if="${paginaAtleti.hasPrevious()}" 
           th:href="@{/squadre/{id}(id=${squadra.id}, page=${paginaAtleti.number - 1})}">
           &laquo; Pagina Precedente
        </a>

        <span style="margin: 0 10px;" 
              th:text="' Pagina ' + (${paginaAtleti.number} + 1) + ' di ' + ${paginaAtleti.totalPages} + ' '">
        </span>

        <a th:if="${paginaAtleti.hasNext()}" 
           th:href="@{/squadre/{id}(id=${squadra.id}, page=${paginaAtleti.number + 1})}">
           Pagina Successiva &raquo;
        </a>

    </div>

</body>
</html>
